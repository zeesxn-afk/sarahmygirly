<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Night Train</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<style>
body { margin:0; overflow:hidden; background:#02020a; font-family:Arial; }
canvas { display:block; }

#ui {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  pointer-events:none;
  color:white;
}

#title {
  position:absolute;
  top:40%;
  width:100%;
  text-align:center;
  font-size:40px;
  letter-spacing:6px;
}

#hint {
  position:absolute;
  top:52%;
  width:100%;
  text-align:center;
  opacity:0.7;
}

#btn {
  position:absolute;
  top:60%;
  left:50%;
  transform:translateX(-50%);
  padding:12px 18px;
  background:white;
  color:black;
  border:none;
  cursor:pointer;
  pointer-events:auto;
}

#msg {
  position:absolute;
  bottom:15%;
  width:100%;
  text-align:center;
  font-size:18px;
}
</style>
</head>

<body>

<div id="ui">
  <div id="title">NIGHT TRAIN</div>
  <div id="hint">WASD to move • Walk into lights • Cinematic journey</div>
  <button id="btn">Board Train</button>
  <div id="msg"></div>
</div>

<script>
let scene, camera, renderer;
let player, train;
let keys = {};
let speed = 0.12;
let msg = document.getElementById("msg");

let story = [
  "Some journeys begin without permission.",
  "The train remembers every passenger.",
  "You are not lost. You are arriving.",
  "Silence is also a language.",
  "This carriage exists between memories.",
  "Almost there...",
  "..."
];

let index = 0;

let checkpoints = [];

init();

function init() {
  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x02020a, 10, 80);

  camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);

  renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // lights
  let light = new THREE.PointLight(0xffffff, 1);
  light.position.set(0,5,5);
  scene.add(light);

  let ambient = new THREE.AmbientLight(0x222244);
  scene.add(ambient);

  // train floor
  let floorGeo = new THREE.BoxGeometry(6,0.2,200);
  let floorMat = new THREE.MeshStandardMaterial({ color:0x111122 });
  let floor = new THREE.Mesh(floorGeo, floorMat);
  floor.position.z = -50;
  scene.add(floor);

  // train walls
  let wallGeo = new THREE.BoxGeometry(0.2,4,200);
  let wallMat = new THREE.MeshStandardMaterial({ color:0x0d0d1a });

  let left = new THREE.Mesh(wallGeo, wallMat);
  left.position.set(-3,2,-50);
  scene.add(left);

  let right = new THREE.Mesh(wallGeo, wallMat);
  right.position.set(3,2,-50);
  scene.add(right);

  // player
  player = new THREE.Object3D();
  player.position.set(0,1,-2);
  scene.add(player);

  camera.position.set(0,2,5);

  // glowing checkpoints
  for(let i=0;i<story.length;i++){
    let geo = new THREE.SphereGeometry(0.2,16,16);
    let mat = new THREE.MeshStandardMaterial({
      color:0x88ccff,
      emissive:0x88ccff,
      emissiveIntensity:1
    });

    let orb = new THREE.Mesh(geo, mat);
    orb.position.set(0,1.5,-10 - i*10);
    scene.add(orb);

    checkpoints.push({ mesh: orb, text: story[i], triggered:false });
  }

  // events
  window.addEventListener("keydown", e=>keys[e.key.toLowerCase()]=true);
  window.addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);

  document.getElementById("btn").onclick = start;

  animate();
}

function start(){
  document.getElementById("title").style.display="none";
  document.getElementById("hint").style.display="none";
  document.getElementById("btn").style.display="none";
  msg.innerText = "Walk forward...";
}

function animate(){
  requestAnimationFrame(animate);

  if(keys["w"]) player.position.z -= speed;
  if(keys["s"]) player.position.z += speed;
  if(keys["a"]) player.position.x -= speed;
  if(keys["d"]) player.position.x += speed;

  // camera follow (3rd person)
  camera.position.x += (player.position.x - camera.position.x)*0.08;
  camera.position.z += (player.position.z + 5 - camera.position.z)*0.08;
  camera.lookAt(player.position);

  // checkpoint logic
  checkpoints.forEach(c=>{
    let dist = player.position.distanceTo(c.mesh.position);

    if(dist < 1.2 && !c.triggered){
      c.triggered = true;
      msg.innerText = c.text;

      setTimeout(()=>msg.innerText="", 2500);

      index++;

      if(index === checkpoints.length){
        endGame();
      }
    }
  });

  renderer.render(scene,camera);
}

function endGame(){
  msg.innerHTML = `
    <div style="font-size:22px">
      HAPPY BIRTHDAY TASNEEM<br><br>
      The train has arrived where it always meant to stop.<br><br>
      <a href="https://sarahloveruwu.carrd.co/" target="_blank" style="color:#88ccff">
        Open the final letter
      </a>
    </div>
  `;
}

window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
